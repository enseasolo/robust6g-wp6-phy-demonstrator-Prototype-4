openapi: 3.1.0
info:
  title: ROBUST-6G WP6 PHY Demonstrator API
  version: 0.1.0
  description: |
    HTTP/JSON interface to the ROBUST-6G Work Package 6 physical-layer
    demonstrator. The component exposes three independent detection
    capabilities operating on a shared 24 × 24 measured-CSI grid:

      * Spatial GLRT + WL-CUSUM jamming detection
      * Root-MUSIC AoA-based spoofing detection
      * Polar-CRC reconciliation + Davies-Meyer/AES-128 secret-key generation

    Each capability is invoked via an idempotent POST that takes a scene
    description (positions of legitimate user, jammer, spoofer, eavesdropper)
    and operating-point parameters, runs the corresponding engine
    in-process, and returns structured JSON results.

    Coordinates are expressed in metres. The valid placement region is
    bounded by /grid (see GET response below); positions outside the
    bounding box are snapped to the nearest dataset measurement point.

  contact:
    name: ROBUST-6G WP6 — PHY Demonstrator team
    # email: <fill in>
  license:
    name: To be confirmed (project deliverable)

servers:
  - url: http://{host}:{port}/api/v1
    description: Local container deployment
    variables:
      host: { default: localhost }
      port: { default: "8000" }

tags:
  - name: meta
    description: Capability discovery and grid metadata.
  - name: jamming
    description: Spatial GLRT jamming detection.
  - name: spoofing
    description: AoA-based spoofing detection.
  - name: skg
    description: Physical-layer secret-key generation.

paths:
  /health:
    get:
      tags: [meta]
      summary: Liveness/readiness probe.
      operationId: getHealth
      responses:
        '200':
          description: Component is up; engines loaded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }

  /grid:
    get:
      tags: [meta]
      summary: Return placement-grid metadata (bounding box, dataset points).
      description: |
        Use this once at startup to learn where nodes may be placed.
        Coordinates outside the bounding box are snapped to the nearest
        dataset point by the engines, but callers should validate up-front.
      operationId: getGrid
      responses:
        '200':
          description: Grid description.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GridInfo' }

  /jamming/detect:
    post:
      tags: [jamming]
      summary: Run one full jamming-detection simulation.
      description: |
        Runs the GLRT detector for `n_steps` snapshots (default 30) and
        returns the final-step verdict together with per-step diagnostics.
      operationId: detectJamming
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JammingRequest' }
      responses:
        '200':
          description: Detection result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JammingResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/InternalError' }

  /spoofing/detect:
    post:
      tags: [spoofing]
      summary: Run one AoA-based spoof-detection simulation.
      operationId: detectSpoofing
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SpoofingRequest' }
      responses:
        '200':
          description: Detection result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SpoofingResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/InternalError' }

  /skg/generate:
    post:
      tags: [skg]
      summary: Run one secret-key generation cycle (Alice–Bob, optional Eve).
      description: |
        Runs the Polar-CRC reconciliation pipeline followed by Davies-Meyer
        AES-128 hashing. Latency is typically 25–40 s; clients should expect
        a long-poll style response.
      operationId: generateSecretKey
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SkgRequest' }
      responses:
        '200':
          description: Generated key + reconciliation diagnostics.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SkgResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/InternalError' }

components:

  responses:
    BadRequest:
      description: Malformed request (missing field, position out of bounds, etc).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    InternalError:
      description: Engine-side failure (CSI dataset unavailable, decoder error, ...).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:

    Health:
      type: object
      required: [status, engines]
      properties:
        status:    { type: string, enum: [ok, degraded] }
        version:   { type: string, example: "0.1.0" }
        engines:
          type: object
          properties:
            jamming_loaded:  { type: boolean }
            spoofing_loaded: { type: boolean }
            skg_loaded:      { type: boolean }
            dataset_path:    { type: string, example: "data_ULA_skg.npz" }

    GridInfo:
      type: object
      required: [bbox_m, n_dataset_points, ula]
      properties:
        bbox_m:
          type: object
          description: Axis-aligned bounding box of the placement region (metres).
          required: [x_min, x_max, y_min, y_max]
          properties:
            x_min: { type: number, example: -1.5 }
            x_max: { type: number, example:  1.5 }
            y_min: { type: number, example:  1.0 }
            y_max: { type: number, example:  4.0 }
        n_dataset_points: { type: integer, example: 576 }
        delta_m:
          type: number
          description: Nominal grid spacing (metres) used by the GLRT path-loss model.
          example: 0.1215
        ula:
          type: object
          description: Position and size of the receive antenna array.
          properties:
            n_elements: { type: integer, example: 64 }
            x_m:        { type: number, example: 3.0 }
            y_m:        { type: array, items: { type: number } }

    Position2D:
      type: object
      required: [x, y]
      properties:
        x: { type: number, description: "x coordinate (m)" }
        y: { type: number, description: "y coordinate (m)" }

    OperatingPoint:
      type: object
      properties:
        snr_db:
          type: number
          description: Receiver SNR setting in dB. Demonstrator presets are 10 (Low), 20 (Medium), 30 (High).
          default: 20
        pj_dbm:
          type: number
          description: Jammer transmit power in dBm. Demonstrator presets are 7 (Low), 15 (Medium), 25 (High).
          default: 15

    JammingRequest:
      type: object
      required: [user]
      properties:
        user:    { $ref: '#/components/schemas/Position2D' }
        jammer:  { $ref: '#/components/schemas/Position2D' }
        operating_point:
          $ref: '#/components/schemas/OperatingPoint'
        n_steps:
          type: integer
          description: Number of WL-CUSUM iterations.
          minimum: 1
          maximum: 200
          default: 30

    JammingResponse:
      type: object
      required: [alarm, peak_score, threshold]
      properties:
        alarm:           { type: boolean, description: "True if jamming was detected at the final step." }
        spatial_alarm:   { type: boolean }
        temporal_alarm:  { type: boolean }
        peak_score:      { type: number, description: "GLRT peak score at the estimated jammer location." }
        threshold:       { type: number, description: "Bonferroni-corrected GLRT threshold." }
        cusum_g_t:       { type: number }
        jammer_estimated:
          allOf:
            - $ref: '#/components/schemas/Position2D'
            - description: "Snapped to nearest grid cell. null if no alarm."
          nullable: true
        sinr_user_db:    { type: number }
        jn_user_db:      { type: number }
        sinr_drop_db:    { type: number }
        confidence:
          type: string
          enum: [None, Low, Medium, High, "Very High"]

    SpoofingRequest:
      type: object
      required: [user, spoofer]
      properties:
        user:    { $ref: '#/components/schemas/Position2D' }
        spoofer: { $ref: '#/components/schemas/Position2D' }
        jammer:  { $ref: '#/components/schemas/Position2D' }
        operating_point:
          $ref: '#/components/schemas/OperatingPoint'

    SpoofingResponse:
      type: object
      required: [verdict, delta_aoa_deg]
      properties:
        verdict:
          type: string
          enum: [SPOOF_FAIL, SPOOF_SUCCESS, AMBIGUOUS]
        detected:        { type: boolean, description: "True if spoofing was caught." }
        delta_aoa_deg:   { type: number, description: "|ΔAoA| between user and spoofer estimates after mitigation." }
        med_ae_deg:      { type: number, description: "Clean-baseline median AoA error." }
        mae_deg:         { type: number, description: "Clean-baseline mean AoA error." }
        grid_success_rate_pct:
          type: number
          description: "Fraction of non-ambiguous grid cells where a spoofer would be detected (defender's success rate)."

    SkgRequest:
      type: object
      required: [user]
      properties:
        user:        { $ref: '#/components/schemas/Position2D' }
        eavesdropper:
          allOf:
            - $ref: '#/components/schemas/Position2D'
            - description: "Optional; if omitted, only Alice/Bob reconciliation is run."
          nullable: true
        operating_point:
          $ref: '#/components/schemas/OperatingPoint'
        seed:
          type: integer
          description: "RNG seed for reproducibility."
          default: 42

    SkgResponse:
      type: object
      required: [reconciliation_pct, alice_key_hex, n_recon_bits, alice_bob_match]
      properties:
        reconciliation_pct: { type: number, description: "100 × (1 – error_prob) from the Polar-CRC decoder." }
        error_prob:         { type: number }
        n_recon_bits:       { type: integer }
        alice_key_hex:      { type: string, example: "f9c535d28b874ff0e117e80b5fd592fd" }
        alice_bob_match:    { type: boolean }
        eve:
          type: object
          nullable: true
          description: "Present only when an eavesdropper position is provided."
          properties:
            key_hex:           { type: string }
            pre_hash_match_pct: { type: number, description: "Bit-match between Eve's quantised CSI and Alice's reconciled bits." }
            post_hash_match_pct: { type: number, description: "Bit-match between Eve's hashed key and Alice's." }

    Error:
      type: object
      required: [error]
      properties:
        error:   { type: string, example: "POSITION_OUT_OF_BBOX" }
        message: { type: string }
        detail:  { type: object, additionalProperties: true }
